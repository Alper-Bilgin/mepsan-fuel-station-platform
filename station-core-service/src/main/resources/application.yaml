server:
  port: 8082

spring:
  application:
    name: station-core-service
  datasource:
    url: jdbc:oracle:thin:@localhost:1521/FREEPDB1
    username: mepsan_admin
    password: mepsan123
    driver-class-name: oracle.jdbc.OracleDriver
  jpa:
    properties:
      hibernate:
        jdbc:
          use_get_generated_keys: false
    hibernate:
      ddl-auto: validate # Tabloları Flyway yönetecek
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  rabbitmq:
    host: localhost
    port: 5672
    username: mepsan_mq
    password: mepsan123
  data:
    redis:
      host: localhost
      port: 6379

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always